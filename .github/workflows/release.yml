name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
      - name: Verify release tag matches package version
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${expected_tag}."
            exit 1
          fi
      - run: npm pack --dry-run
      - run: mkdir -p artifacts
      - run: npm pack --pack-destination ./artifacts
      - name: Smoke installed release tarball
        run: |
          set -euo pipefail
          repo_dir="$PWD"
          smoke_dir="$(mktemp -d)"
          cd "$smoke_dir"
          npm init -y
          npm install "$repo_dir"/artifacts/repo-context-cli-*.tgz
          ./node_modules/.bin/repo-context pack --dry-run --for codex
      - run: npm publish
